<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KibeProxy Hub | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>

<!-- ── NAVBAR ── -->
<nav>
  <a class="nav-logo" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>
    <span class="logo-text">KibeProxy Hub</span>
  </a>

  <ul class="nav-links">
    <li><a href="store.html">Buy Proxies</a></li>
    <li><a href="#" onclick="openModal('email')">Buy Emails</a></li>
    <li><a href="#">Support</a></li>
    <li><a href="#">Docs</a></li>
  </ul>

  <div class="nav-right">
    <div class="balance-pill">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
      KES 0
    </div>
    <a href="admin.html" class="admin-badge" id="admin-link" style="display:none;">ADMIN</a>
    <span style="font-size:0.85rem;font-weight:600;color:var(--text-primary);">Dashboard</span>
    <button class="user-btn" onclick="handleLogout()" title="Click to logout">
      <div class="user-avatar" id="user-initials">--</div>
      <span id="user-name">Loading...</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>

<!-- ── MAIN ── -->
<main>
  <div class="page-header">
    <h1 class="page-title">My Dashboard</h1>
    <p class="page-subtitle">View and manage your purchased proxies</p>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Active Proxies</div>
      <div class="stat-value green" id="stat-active">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Expired Proxies</div>
      <div class="stat-value" id="stat-expired">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Emails</div>
      <div class="stat-value" id="stat-emails">—</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="switchTab(this, 'active')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
        Active <span class="tab-badge" id="badge-active">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab(this, 'expired')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
        Expired <span class="tab-badge" id="badge-expired">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab(this, 'emails')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Emails <span class="tab-badge" id="badge-emails">0</span>
      </button>
    </div>
    <button class="add-btn" id="add-btn" onclick="openModal('proxy')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Proxy
    </button>
  </div>

  <!-- PANELS -->
  <div class="panel" id="panel-active">
    <div class="loading"><div class="spinner"></div> Loading...</div>
  </div>
  <div class="panel" id="panel-expired" style="display:none;">
    <div class="loading"><div class="spinner"></div> Loading...</div>
  </div>
  <div class="panel" id="panel-emails" style="display:none;">
    <div class="loading"><div class="spinner"></div> Loading...</div>
  </div>
</main>

<!-- ── PROXY MODAL ── -->
<div class="modal-overlay" id="modal-proxy">
  <div class="modal">
    <div class="modal-title">Add New Proxy</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Host / IP</label>
        <input class="form-input" id="p-host" placeholder="192.168.1.1" />
      </div>
      <div class="form-group">
        <label class="form-label">Port</label>
        <input class="form-input" id="p-port" type="number" placeholder="8080" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="p-user" placeholder="proxyuser" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="p-pass" type="password" placeholder="••••••••" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="p-status">
          <option value="active">Active</option>
          <option value="expired">Expired</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Expires At</label>
        <input class="form-input" id="p-expires" type="datetime-local" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('proxy')">Cancel</button>
      <button class="btn-submit" onclick="addProxy()">Add Proxy</button>
    </div>
  </div>
</div>

<!-- ── EMAIL MODAL ── -->
<div class="modal-overlay" id="modal-email">
  <div class="modal">
    <div class="modal-title">Add New Email</div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" id="e-email" type="email" placeholder="user@example.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="e-pass" type="password" placeholder="••••••••" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('email')">Cancel</button>
      <button class="btn-submit" onclick="addEmail()">Add Email</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<!-- ── SCRIPTS ── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/index.js"></script>

</body>
</html>
