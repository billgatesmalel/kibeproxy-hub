<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KibeProxy Hub | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --border-light: #2a2a2a;
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #555;
      --green: #22c55e;
      --green-dim: #166534;
      --green-glow: rgba(34,197,94,0.15);
      --red: #ef4444;
      --yellow: #eab308;
      --yellow-glow: rgba(234,179,8,0.1);
    }

    html, body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 64px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo-icon::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--green);
      border-radius: 50%;
      opacity: 0.5;
    }

    .logo-icon svg { width: 14px; height: 14px; }

    .logo-text {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text-primary); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .balance-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--green-glow);
      border: 1px solid var(--green-dim);
      color: var(--green);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }

    .admin-badge {
      background: var(--yellow-glow);
      border: 1px solid rgba(234,179,8,0.35);
      color: var(--yellow);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      font-family: 'DM Mono', monospace;
      text-decoration: none;
      transition: background 0.2s;
    }

    .admin-badge:hover { background: rgba(234,179,8,0.2); }

    .user-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 6px 14px;
      color: var(--text-primary);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .user-btn:hover { border-color: var(--red); color: var(--red); }

    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #000;
      flex-shrink: 0;
    }

    /* ── MAIN ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2.5rem;
    }

    .page-header { margin-bottom: 2rem; }

    .page-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .page-subtitle {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .stat-value.green { color: var(--green); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .tabs-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 22px;
      border: none;
      background: transparent;
      border-radius: 7px;
      color: var(--text-secondary);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--border-light);
      color: var(--text-primary);
    }

    .tab-btn:hover:not(.active) { color: var(--text-primary); }

    .tab-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      background: var(--border);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--green);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── PANEL ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    /* ── TABLE ── */
    .data-table { width: 100%; border-collapse: collapse; }

    .data-table th {
      padding: 12px 20px;
      text-align: left;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    .data-table td {
      padding: 14px 20px;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
    }

    .badge.active  { background: var(--green-glow); color: var(--green); border: 1px solid var(--green-dim); }
    .badge.expired { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

    .mono {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .delete-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-muted);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: all 0.2s;
    }

    .delete-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      gap: 1rem;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      color: var(--text-muted);
      animation: float 3s ease-in-out infinite;
    }

    .empty-title { font-size: 1rem; font-weight: 600; color: var(--text-secondary); }
    .empty-sub   { font-size: 0.85rem; color: var(--text-muted); }

    /* ── MODALS ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #161616;
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.25s ease;
    }

    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }

    .form-group  { margin-bottom: 1rem; }

    .form-label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--green); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .form-select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      padding: 9px 20px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .btn-submit {
      background: var(--green);
      color: #000;
      border: none;
      padding: 9px 20px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1a1a1a;
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.85rem;
      color: var(--text-primary);
      z-index: 300;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.show    { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green-dim); }
    .toast.error   { border-color: rgba(239,68,68,0.4); }

    /* ── LOADING ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 10px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-light);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes spin   { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      nav { padding: 0 1.2rem; }
      main { padding: 2rem 1.2rem; }
      .nav-links { display: none; }
      .stats-row { grid-template-columns: 1fr; }
      .form-row  { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────
  const ADMIN_EMAIL = 'kibetian2005@gmail.com';

  // ── SUPABASE ───────────────────────────────────────────────────
  const { createClient } = supabase;
  const db = createClient(
    'https://dyhzdtvnirqwhsfmrvjo.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5aHpkdHZuaXJxd2hzZm1ydmpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDYyMzEsImV4cCI6MjA4OTE4MjIzMX0.eJJ1Bau5V6qJoLt0qtEJXvZPnKGWG6hj6QLF2S2bpGE'

  let currentUserId = null;

  // ── AUTH GUARD ─────────────────────────────────────────────────
  async function initAuth() {
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'auth.html'; return; }

    const user     = session.user;
    currentUserId  = user.id;
    const name     = user.user_metadata?.full_name || user.email.split('@')[0];
    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

    document.getElementById('user-name').textContent     = name;
    document.getElementById('user-initials').textContent = initials;

    // Show admin badge only for admin
    if (user.email === ADMIN_EMAIL) {
      document.getElementById('admin-link').style.display = 'inline-flex';
    }

    loadAll();
  }

  async function handleLogout() {
    await db.auth.signOut();
    window.location.href = 'auth.html';
  }

  // ── TOAST ──────────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.className = `toast ${type} show`;
    t.innerHTML = `<span style="color:${type === 'success' ? '#22c55e' : '#ef4444'}">${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── MODAL ──────────────────────────────────────────────────────
  function openModal(type) {
    document.getElementById(`modal-${type}`).classList.add('open');
  }

  function closeModal(type) {
    document.getElementById(`modal-${type}`).classList.remove('open');
  }

  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  // ── TAB SWITCH ─────────────────────────────────────────────────
  function switchTab(btn, tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['active', 'expired', 'emails'].forEach(t => {
      document.getElementById('panel-' + t).style.display = t === tab ? 'block' : 'none';
    });
    const addBtn = document.getElementById('add-btn');
    if (tab === 'emails') {
      addBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Email`;
      addBtn.onclick = () => openModal('email');
    } else {
      addBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Proxy`;
      addBtn.onclick = () => openModal('proxy');
    }
  }

  // ── RENDER PROXIES ─────────────────────────────────────────────
  function renderProxies(data, panelId, status) {
    const panel = document.getElementById(panelId);
    if (!data || data.length === 0) {
      panel.innerHTML = `
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 64 64" fill="none">
            <path d="M32 8L56 20V44L32 56L8 44V20L32 8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M8 20L32 32L56 20" stroke="currentColor" stroke-width="1.5"/>
            <path d="M32 32V56" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <p class="empty-title">No ${status} proxies</p>
          <p class="empty-sub">${status === 'active' ? 'Add a proxy to get started' : 'Expired proxies will appear here'}</p>
        </div>`;
      return;
    }
    panel.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>Host</th>
            <th>Port</th>
            <th>Username</th>
            <th>Status</th>
            <th>Expires</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(p => `
            <tr>
              <td class="mono">${p.host || '—'}</td>
              <td class="mono">${p.port || '—'}</td>
              <td class="mono">${p.username || '—'}</td>
              <td><span class="badge ${p.status}">${p.status}</span></td>
              <td class="mono" style="font-size:0.78rem;color:var(--text-muted)">
                ${p.expires_at ? new Date(p.expires_at).toLocaleDateString() : '—'}
              </td>
              <td><button class="delete-btn" onclick="deleteProxy('${p.id}')">Delete</button></td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  // ── RENDER EMAILS ──────────────────────────────────────────────
  function renderEmails(data) {
    const panel = document.getElementById('panel-emails');
    if (!data || data.length === 0) {
      panel.innerHTML = `
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 64 64" fill="none">
            <rect x="8" y="16" width="48" height="32" rx="4" stroke="currentColor" stroke-width="2"/>
            <path d="M8 22L32 38L56 22" stroke="currentColor" stroke-width="2"/>
          </svg>
          <p class="empty-title">No emails</p>
          <p class="empty-sub">Add an email to get started</p>
        </div>`;
      return;
    }
    panel.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>Email</th>
            <th>Added</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(e => `
            <tr>
              <td class="mono">${e.email}</td>
              <td class="mono" style="font-size:0.78rem;color:var(--text-muted)">
                ${new Date(e.created_at).toLocaleDateString()}
              </td>
              <td><button class="delete-btn" onclick="deleteEmail('${e.id}')">Delete</button></td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  // ── LOAD ALL DATA ──────────────────────────────────────────────
  async function loadAll() {
    const [{ data: proxies }, { data: emails }] = await Promise.all([
      db.from('proxies').select('*').eq('user_id', currentUserId).order('created_at', { ascending: false }),
      db.from('emails').select('*').eq('user_id', currentUserId).order('created_at', { ascending: false })
    ]);

    const active    = (proxies || []).filter(p => p.status === 'active');
    const expired   = (proxies || []).filter(p => p.status === 'expired');
    const emailList = emails || [];

    // Stats
    document.getElementById('stat-active').textContent  = active.length;
    document.getElementById('stat-expired').textContent = expired.length;
    document.getElementById('stat-emails').textContent  = emailList.length;

    // Tab badges
    document.getElementById('badge-active').textContent  = active.length;
    document.getElementById('badge-expired').textContent = expired.length;
    document.getElementById('badge-emails').textContent  = emailList.length;

    // Render
    renderProxies(active,  'panel-active',  'active');
    renderProxies(expired, 'panel-expired', 'expired');
    renderEmails(emailList);
  }

  // ── ADD PROXY ──────────────────────────────────────────────────
  async function addProxy() {
    const host       = document.getElementById('p-host').value.trim();
    const port       = parseInt(document.getElementById('p-port').value);
    const username   = document.getElementById('p-user').value.trim();
    const password   = document.getElementById('p-pass').value;
    const status     = document.getElementById('p-status').value;
    const expires_at = document.getElementById('p-expires').value || null;

    if (!host || !port) { showToast('Host and Port are required', 'error'); return; }

    const { error } = await db.from('proxies').insert([{
      user_id: currentUserId, host, port, username, password, status, expires_at
    }]);

    if (error) { showToast('Failed: ' + error.message, 'error'); return; }

    closeModal('proxy');
    showToast('Proxy added successfully!');
    ['p-host','p-port','p-user','p-pass','p-expires'].forEach(id => document.getElementById(id).value = '');
    await loadAll();
  }

  // ── ADD EMAIL ──────────────────────────────────────────────────
  async function addEmail() {
    const email    = document.getElementById('e-email').value.trim();
    const password = document.getElementById('e-pass').value;

    if (!email) { showToast('Email is required', 'error'); return; }

    const { error } = await db.from('emails').insert([{
      user_id: currentUserId, email, password
    }]);

    if (error) { showToast('Failed: ' + error.message, 'error'); return; }

    closeModal('email');
    showToast('Email added successfully!');
    document.getElementById('e-email').value = '';
    document.getElementById('e-pass').value  = '';
    await loadAll();
  }

  // ── DELETE PROXY ───────────────────────────────────────────────
  async function deleteProxy(id) {
    if (!confirm('Delete this proxy?')) return;
    const { error } = await db.from('proxies').delete().eq('id', id);
    if (error) { showToast('Delete failed', 'error'); return; }
    showToast('Proxy deleted');
    await loadAll();
  }

  // ── DELETE EMAIL ───────────────────────────────────────────────
  async function deleteEmail(id) {
    if (!confirm('Delete this email?')) return;
    const { error } = await db.from('emails').delete().eq('id', id);
    if (error) { showToast('Delete failed', 'error'); return; }
    showToast('Email deleted');
    await loadAll();
  }

  // ── START ──────────────────────────────────────────────────────
  initAuth();
</script>
</body>
</html>
