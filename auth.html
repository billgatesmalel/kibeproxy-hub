<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KibeProxy Hub | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="auth-card">

    <!-- LOGO -->
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <span class="logo-text-auth">KibeProxy Hub</span>
    </div>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Login</button>
      <button class="auth-tab" onclick="switchAuth('signup')">Sign Up</button>
    </div>

    <!-- ALERT -->
    <div class="alert" id="alert"></div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" id="login-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="login-password" type="password" placeholder="••••••••" />
      </div>
      <button class="submit-btn" id="login-btn" onclick="handleLogin()">
        Login to Dashboard
      </button>
      <div class="auth-footer">
        Don't have an account?
        <span onclick="switchAuth('signup')">Sign up free</span>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="form-signup" style="display:none;">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" id="signup-name" type="text" placeholder="Ian Kibet" />
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" id="signup-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="signup-password" type="password" placeholder="Min. 6 characters" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" id="signup-confirm" type="password" placeholder="Repeat password" />
      </div>
      <button class="submit-btn" id="signup-btn" onclick="handleSignup()">
        Create Account
      </button>
      <div class="auth-footer">
        Already have an account?
        <span onclick="switchAuth('login')">Login</span>
      </div>
    </div>

  </div>

  <!-- ── SCRIPTS ── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
